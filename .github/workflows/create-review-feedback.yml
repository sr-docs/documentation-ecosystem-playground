name: Documentation Ecosystem - Create REVIEW Feedback

on:
  workflow_dispatch:
    inputs:
      comment:
        description: "Reviewer's comment"
        required: true
        type: string
      decision:
        description: "Approve or Request Changes"
        required: true
        type: string
      requestId:
        description: "Request ID for tracking"
        required: true
        type: string

permissions:
  issues: write

jobs:
  create-issue:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create GitHub Issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMENT: ${{ github.event.inputs.comment }}
          DECISION: ${{ github.event.inputs.decision }}
          REQUEST_ID: ${{ github.event.inputs.requestId }}
        run: |
          cat > issue.md << EOF
          ## Decision

          $DECISION

          ## Reviewer Comment

          $COMMENT

          ---

          Generated from the Documentation Ecosystem Playground.

          <!-- request-id: $REQUEST_ID -->
          EOF

          gh issue create \
            --title "Review feedback: NimbusAuth quick start" \
            --body-file issue.md \
            --label "playground" \
            --label "status:review"

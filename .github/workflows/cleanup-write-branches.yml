name: Cleanup WRITE Branches

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Close stale WRITE pull requests
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.WRITE_PAT }}
          script: |
            const sevenDaysAgo = new Date();
            sevenDaysAgo.setDate(sevenDaysAgo.getDate() - 7);

            const PROTECTED_BRANCHES = ['write/seed-fallback-001', 'write/seed-api-reference'];

            const { data: pulls } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100,
            });

            for (const pr of pulls) {
              const isWritePR = pr.head.ref.startsWith('write/');
              const isProtected = PROTECTED_BRANCHES.includes(pr.head.ref);
              const isStale = new Date(pr.created_at) < sevenDaysAgo;

              if (isWritePR && !isProtected && isStale) {
                await github.rest.pulls.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: pr.number,
                  state: 'closed',
                });

                await github.rest.git.deleteRef({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: `heads/${pr.head.ref}`,
                });
              }
            }

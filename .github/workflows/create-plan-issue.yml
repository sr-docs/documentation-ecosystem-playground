name: Documentation Ecosystem - Create PLAN Issue

on:
  workflow_dispatch:
    inputs:
      title:
        description: "Issue title"
        required: true
        type: string
      problem:
        description: "Problem statement"
        required: true
        type: string
      audience:
        description: "Target audience"
        required: true
        type: string
      documentationNeeded:
        description: "Documentation required"
        required: true
        type: string
      successCriteria:
        description: "Success criteria"
        required: true
        type: string
      requestId:
        description: "Request ID for tracking"
        required: true
        type: string

permissions:
  issues: write

jobs:
  create-issue:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Create GitHub Issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TITLE: ${{ github.event.inputs.title }}
          PROBLEM: ${{ github.event.inputs.problem }}
          AUDIENCE: ${{ github.event.inputs.audience }}
          DOCS: ${{ github.event.inputs.documentationNeeded }}
          SUCCESS: ${{ github.event.inputs.successCriteria }}
          REQUEST_ID: ${{ github.event.inputs.requestId }}
        run: |
          {
            printf '## Problem\n\n%s\n\n' "$PROBLEM"
            printf '## Audience\n\n%s\n\n' "$AUDIENCE"
            printf '## Documentation Needed\n\n%s\n\n' "$DOCS"
            printf '## Success Criteria\n\n%s\n\n' "$SUCCESS"
            printf -- '---\n\n'
            printf 'Generated from the Documentation Ecosystem Playground.\n\n'
            printf '<!-- request-id: %s -->\n' "$REQUEST_ID"
          } > issue.md

          gh issue create \
            --title "$TITLE" \
            --body-file issue.md \
            --label "playground" \
            --label "status:plan"

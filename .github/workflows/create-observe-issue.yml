name: Documentation Ecosystem - Create OBSERVE Issue

on:
  workflow_dispatch:
    inputs:
      title:
        description: "Issue title"
        required: true
        type: string
      notes:
        description: "Observation and recommended next step"
        required: true
        type: string
      requestId:
        description: "Request ID for tracking"
        required: true
        type: string

permissions:
  issues: write

jobs:
  create-issue:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create GitHub Issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TITLE: ${{ github.event.inputs.title }}
          NOTES: ${{ github.event.inputs.notes }}
          REQUEST_ID: ${{ github.event.inputs.requestId }}
        run: |
          {
            printf '## Observation\n\n%s\n\n' "$NOTES"
            printf -- '---\n\n'
            printf 'Generated from the Documentation Ecosystem Playground.\n\n'
            printf '<!-- request-id: %s -->\n' "$REQUEST_ID"
          } > issue.md

          gh issue create \
            --title "$TITLE" \
            --body-file issue.md \
            --label "playground" \
            --label "status:observe"

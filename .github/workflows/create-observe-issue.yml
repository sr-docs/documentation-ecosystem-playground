name: Documentation Ecosystem - Create OBSERVE Issue

on:
  workflow_dispatch:
    inputs:
      title:
        description: "Issue title"
        required: true
        type: string
      observation:
        description: "What was observed"
        required: true
        type: string
      recommendation:
        description: "What should happen next"
        required: true
        type: string
      requestId:
        description: "Request ID for tracking"
        required: true
        type: string

permissions:
  issues: write

jobs:
  create-issue:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create GitHub Issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TITLE: ${{ github.event.inputs.title }}
          OBSERVATION: ${{ github.event.inputs.observation }}
          RECOMMENDATION: ${{ github.event.inputs.recommendation }}
          REQUEST_ID: ${{ github.event.inputs.requestId }}
        run: |
          cat > issue.md << EOF
          ## Observation

          $OBSERVATION

          ## Recommendation

          $RECOMMENDATION

          ---

          Generated from the Documentation Ecosystem Playground.

          <!-- request-id: $REQUEST_ID -->
          EOF

          gh issue create \
            --title "$TITLE" \
            --body-file issue.md \
            --label "playground" \
            --label "status:observe"

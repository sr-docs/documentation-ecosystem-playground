name: Cleanup Publish Artifacts

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  actions: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete artifacts and runs older than one hour
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.WRITE_PAT }}
          script: |
            const oneHourAgo = new Date(Date.now() - 60 * 60 * 1000);

            const { data: artifacts } = await github.rest.actions.listArtifactsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });

            for (const artifact of artifacts.artifacts) {
              if (new Date(artifact.created_at) < oneHourAgo && artifact.name.startsWith('quick-start-')) {
                await github.rest.actions.deleteArtifact({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  artifact_id: artifact.id,
                });
              }
            }

            const { data: runs } = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'publish-quickstart.yml',
              per_page: 100,
            });

            for (const run of runs.workflow_runs) {
              if (new Date(run.created_at) < oneHourAgo) {
                await github.rest.actions.deleteWorkflowRun({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  run_id: run.id,
                });
              }
            }

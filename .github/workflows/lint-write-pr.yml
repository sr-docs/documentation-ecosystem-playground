name: Lint WRITE Submission

on:
  pull_request:
    paths:
      - 'tasks/write-instances/**'

jobs:
  checks:
    name: Documentation checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check word count
        run: |
          FILE=$(find tasks/write-instances -type f -name "*.md" | head -n 1)
          WORDS=$(wc -w < "$FILE")
          echo "Word count: $WORDS"
          if [ "$WORDS" -lt 20 ]; then
            echo "Draft is too short."
            exit 1
          fi

      - name: Check instruction consistency
        run: |
          FILE=$(find tasks/write-instances -type f -name "*.md" | head -n 1)
          FAILED=0
          for PATH_FRAG in "/auth/login" "/auth/me" "/auth/refresh" "/auth/logout"; do
            STATED=$(grep -oE "Send an? (GET|POST|PUT|DELETE) request to \`?${PATH_FRAG}" "$FILE" | grep -oE "GET|POST|PUT|DELETE" | head -n1)
            ACTUAL=$(grep -oE "^(GET|POST|PUT|DELETE) https://[^ ]*${PATH_FRAG}" "$FILE" | grep -oE "^(GET|POST|PUT|DELETE)" | head -n1)
            if [ -n "$STATED" ] && [ -n "$ACTUAL" ] && [ "$STATED" != "$ACTUAL" ]; then
              echo "Instruction mismatch for $PATH_FRAG: says $STATED, example shows $ACTUAL."
              FAILED=1
            fi
          done
          if [ "$FAILED" -eq 1 ]; then
            echo "One or more instructions don't match their examples."
            exit 1
          fi
          echo "All instructions match their examples."

      - name: Check endpoint reference accuracy
        run: |
          FILE=$(find tasks/write-instances -type f -name "*.md" | head -n 1)
          node -e "
          const fs = require('fs');
          const text = fs.readFileSync('$FILE', 'utf8');
          const rows = [...text.matchAll(/\| \`(\w+)\` \| \w+ \| No \|/g)].map(m => m[1]);
          let failed = false;
          for (const param of rows) {
            const pattern = new RegExp(param + ' is required', 'i');
            if (pattern.test(text)) {
              console.log('Parameter ' + param + ' is documented as optional but shown as required in the example.');
              failed = true;
            }
          }
          process.exit(failed ? 1 : 0);
          "

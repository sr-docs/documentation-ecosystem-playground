name: Documentation Ecosystem - Update WRITE Draft

on:
  workflow_dispatch:
    inputs:
      draftContent:
        description: "Updated draft content"
        required: true
        type: string
      branch:
        description: "Branch to commit to"
        required: true
        type: string
      filePath:
        description: "File path to update"
        required: true
        type: string
      requestId:
        description: "Request ID for tracking"
        required: true
        type: string

permissions:
  contents: write

jobs:
  update-draft:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update draft file on the target branch
        uses: actions/github-script@v7
        env:
          DRAFT_CONTENT: ${{ github.event.inputs.draftContent }}
          BRANCH: ${{ github.event.inputs.branch }}
          FILE_PATH: ${{ github.event.inputs.filePath }}
        with:
          github-token: ${{ secrets.WRITE_PAT }}
          script: |
            const draftContent = process.env.DRAFT_CONTENT;
            const branch = process.env.BRANCH;
            const filePath = process.env.FILE_PATH;

            const { data: existingFile } = await github.rest.repos.getContent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: filePath,
              ref: branch,
            });

            await github.rest.repos.createOrUpdateFileContents({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: filePath,
              message: `Update draft (${branch})`,
              content: Buffer.from(draftContent).toString('base64'),
              branch: branch,
              sha: existingFile.sha,
            });

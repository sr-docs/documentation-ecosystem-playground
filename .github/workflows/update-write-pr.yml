name: Documentation Ecosystem - Update WRITE Draft

on:
  workflow_dispatch:
    inputs:
      draftContent:
        description: "Updated draft content"
        required: true
        type: string
      requestId:
        description: "Request ID for tracking"
        required: true
        type: string

permissions:
  contents: write

jobs:
  update-draft:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update draft file on the existing branch
        uses: actions/github-script@v7
        env:
          DRAFT_CONTENT: ${{ github.event.inputs.draftContent }}
          DRAFT_REQUEST_ID: ${{ github.event.inputs.requestId }}
        with:
          github-token: ${{ secrets.WRITE_PAT }}
          script: |
            const draftContent = process.env.DRAFT_CONTENT;
            const requestId = process.env.DRAFT_REQUEST_ID;
            const branchName = 'write/seed-fallback-001';
            const filePath = 'tasks/write-instances/seed-fallback-001.md';

            const { data: existingFile } = await github.rest.repos.getContent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: filePath,
              ref: branchName,
            });

            await github.rest.repos.createOrUpdateFileContents({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: filePath,
              message: `Update draft in response to review feedback (${requestId})`,
              content: Buffer.from(draftContent).toString('base64'),
              branch: branchName,
              sha: existingFile.sha,
            });
